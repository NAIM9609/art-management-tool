  ListProductsFunction:
    Type: AWS::Lambda::Function
    DependsOn: ListProductsLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-product-service-list-products'
      Runtime: nodejs24.x
      Handler: dist/handlers/product.handler.listProducts
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: !Ref LambdaReservedConcurrency
      Role: !GetAtt ProductServiceLambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref DynamoDBTableName
          S3_BUCKET_NAME: !Ref S3BucketName
          CDN_URL: !Ref CdnUrl
          AWS_REGION_CUSTOM: !Ref AWS::Region
          AWS_REGION_NAME: !Ref AWS::Region
          ENVIRONMENT: !Ref Environment
          JWT_SECRET: !Ref JwtSecret

  GetProductFunction:
