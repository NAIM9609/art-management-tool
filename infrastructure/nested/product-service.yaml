AWSTemplateFormatVersion: '2010-09-09'
Description: Product Service - Lambda functions, API Gateway, and IAM roles

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3037

Parameters:
  ProjectName:
    Type: String
    Default: art-management-tool

  Environment:
    Type: String
    AllowedValues:
      - dev
      - staging
      - prod

  DynamoDBTableName:
    Type: String

  DynamoDBTableArn:
    Type: String

  S3BucketName:
    Type: String

  S3BucketArn:
    Type: String

  CdnUrl:
    Type: String
    Default: ''

  JwtSecret:
    Type: String
    NoEcho: true

  AllowedOrigins:
    Type: CommaDelimitedList

  LambdaReservedConcurrency:
    Type: Number
    Default: 10

  LambdaCodeS3Bucket:
    Type: String

  LambdaCodeS3Key:
    Type: String
    Default: lambda-placeholder.zip

Resources:
  # ============================================================================
  # IAM Execution Role
  # ============================================================================
  ProductServiceLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-product-service-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:TransactWriteItems
                  - dynamodb:TransactGetItems
                  - dynamodb:DescribeTable
                Resource:
                  - !Ref DynamoDBTableArn
                  - !Sub '${DynamoDBTableArn}/index/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${S3BucketArn}/products/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Ref S3BucketArn

  # ============================================================================
  # CloudWatch Log Groups
  # ============================================================================
  ListProductsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-list-products'
      RetentionInDays: 14

  GetProductLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-get-product'
      RetentionInDays: 14

  CreateProductLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-create-product'
      RetentionInDays: 14

  UpdateProductLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-update-product'
      RetentionInDays: 14

  DeleteProductLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-delete-product'
      RetentionInDays: 14

  ListCategoriesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-list-categories'
      RetentionInDays: 14

  GetCategoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-get-category'
      RetentionInDays: 14

  CreateCategoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-create-category'
      RetentionInDays: 14

  UpdateCategoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-update-category'
      RetentionInDays: 14

  DeleteCategoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-delete-category'
      RetentionInDays: 14

  ListVariantsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-list-variants'
      RetentionInDays: 14

  CreateVariantLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-create-variant'
      RetentionInDays: 14

  UpdateVariantLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-product-service-update-variant'
      RetentionInDays: 14

  UpdateStockLogGroup:
