services:
  # LocalStack - Local AWS Services Emulation
  localstack:
    image: localstack/localstack:latest
    container_name: art-localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=dynamodb,s3
      - DEBUG=1
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_AUTH_TOKEN=ls-JoMO5116-YIQi-Jepa-0038-vilAZunaad17
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - art-network-dev

  # Backend (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: art-backend-dev
    command: sh -c "[ -x node_modules/.bin/ts-node-dev ] || npm install && npm run dev"
    ports:
      - "8080:8080"
    environment:
      # Application Configuration
      - PORT=8080
      - ENVIRONMENT=development

      # AWS Configuration (LocalStack)
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - S3_BUCKET_NAME=art-images-dev
      - CDN_URL=http://localhost:4566/art-images-dev

      # DynamoDB table names (one per service)
      - PRODUCTS_TABLE_NAME=products
      - ORDERS_TABLE_NAME=orders
      - CARTS_TABLE_NAME=carts
      - DISCOUNTS_TABLE_NAME=discount-codes
      - AUDIT_TABLE_NAME=audit-logs
      - NOTIFICATIONS_TABLE_NAME=notifications
      - CONTENT_TABLE_NAME=content
      - ETSY_TOKENS_TABLE_NAME=etsy-oauth-tokens

      # JWT Configuration
      - JWT_SECRET=dev-secret-change-in-production

      # Payment Configuration
      - PAYMENT_PROVIDER=mock

      # Etsy Integration (disabled in dev)
      - ETSY_SYNC_ENABLED=false

      # Scheduler Configuration
      - SCHEDULER_ENABLED=false

      # Rate Limiting
      - RATE_LIMIT_ENABLED=false

      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=pretty

      # CORS
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - art-network-dev

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: art-frontend-dev
    command: sh -c "[ -x node_modules/.bin/next ] || npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - BACKEND_URL=http://backend:8080
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - art-network-dev

networks:
  art-network-dev:
    driver: bridge

volumes:
  localstack_data:
    driver: local
