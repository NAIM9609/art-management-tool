services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: art-backend-prod
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env.production
    environment:
      # Application Configuration
      - PORT=${PORT:-8080}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      
      # Auto-Migration & Seeding
      - AUTO_MIGRATE=${AUTO_MIGRATE:-true}
      - AUTO_SEED=${AUTO_SEED:-false}
      
      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-jwtpass}
      
      # Payment Configuration
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-stripe}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      
      # Shopify Integration
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY:-}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET:-}
      - SHOPIFY_SHOP_DOMAIN=${SHOPIFY_SHOP_DOMAIN:-}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN:-}
      
      # Etsy Integration
      - ETSY_API_KEY=${ETSY_API_KEY:-}
      - ETSY_API_SECRET=${ETSY_API_SECRET:-}
      - ETSY_SHOP_ID=${ETSY_SHOP_ID:-}
      - ETSY_SHOP_NAME=${ETSY_SHOP_NAME:-}
      - ETSY_SHOP_URL=${ETSY_SHOP_URL:-}
      - ETSY_ACCESS_TOKEN=${ETSY_ACCESS_TOKEN:-}
      - ETSY_REDIRECT_URI=${ETSY_REDIRECT_URI:-https://yourdomain.com/admin/etsy-sync/callback}
      - ETSY_API_BASE_URL=${ETSY_API_BASE_URL:-https://openapi.etsy.com/v3}
      - ETSY_PAYMENT_CALLBACK_URL=${ETSY_PAYMENT_CALLBACK_URL:-}
      - ETSY_SYNC_ENABLED=${ETSY_SYNC_ENABLED:-true}
      - ETSY_SYNC_INTERVAL_PRODUCTS=${ETSY_SYNC_INTERVAL_PRODUCTS:-7200}
      - ETSY_SYNC_INTERVAL_INVENTORY=${ETSY_SYNC_INTERVAL_INVENTORY:-3600}
      - ETSY_RATE_LIMIT_REQUESTS=${ETSY_RATE_LIMIT_REQUESTS:-10000}
      - ETSY_RATE_LIMIT_WINDOW=${ETSY_RATE_LIMIT_WINDOW:-86400}
      
      # Scheduler Configuration
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      
      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - uploads_prod_data:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - art-network-prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Build-time argument for NEXT_PUBLIC_API_URL
        # This MUST be set during build, not runtime
        NEXT_PUBLIC_API_URL: http://localhost:8080
        # BACKEND_URL needed for Next.js rewrites configuration
        BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    container_name: art-frontend-prod
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - PORT=3000
      # NEXT_PUBLIC_* vars are for browser, so use localhost:8080 for client-side requests
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      # BACKEND_URL is for server-side rewrites in Next.js
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}
      - NODE_ENV=${NODE_ENV:-production}
    restart: always
    depends_on:
      - backend
    networks:
      - art-network-prod
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  art-network-prod:
    driver: bridge

volumes:
  uploads_prod_data:
    driver: local
