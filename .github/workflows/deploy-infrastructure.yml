name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

# Only one run per environment at a time; queue rather than cancel so a
# queued apply is never silently dropped.
concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infrastructure/services

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_CUSTOM || 'eu-north-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=services/${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      # Import pre-existing AWS resources BEFORE planning so the saved plan
      # matches the state that apply will see.  Each import is idempotent.
      - name: Import existing AWS resources
        if: github.event.inputs.action == 'apply'
        run: |
          bash ../../scripts/import-existing-resources.sh \
            "${{ github.event.inputs.environment }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -out=tfplan \
            -no-color
        continue-on-error: false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Output endpoint URLs
        if: github.event.inputs.action == 'apply'
        run: terraform output -no-color
