name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      action:
        description: 'Terraform action (plan or apply)'
        required: true
        type: string

# Only one run per environment at a time; queue rather than cancel so a
# queued apply is never silently dropped.
concurrency:
  group: terraform-${{ inputs.environment || github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TARGET_ENV: ${{ inputs.environment || github.event.inputs.environment }}
  TF_ACTION: ${{ inputs.action || github.event.inputs.action }}

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action || github.event.inputs.action }} (${{ inputs.environment || github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infrastructure/services

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi
        working-directory: .

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_CUSTOM }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # ---------------------------------------------------------------------------
      # Auto-provision the S3 state bucket so no manual one-time setup is
      # needed. Uses TF_BACKEND_BUCKET secret if set; otherwise derives a
      # deterministic name from the AWS account ID so it is globally unique.
      # All operations are idempotent — safe to run on every CI invocation.
      # ---------------------------------------------------------------------------
      - name: Bootstrap Terraform state backend
        id: backend
        working-directory: .
        run: |
          REGION="${{ secrets.AWS_REGION_CUSTOM }}"

          if [ -n "${{ secrets.TF_BACKEND_BUCKET }}" ]; then
            BUCKET="${{ secrets.TF_BACKEND_BUCKET }}"
          else
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            BUCKET="art-management-tfstate-${ACCOUNT_ID}"
          fi

          if ! aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            echo "Creating state bucket: ${BUCKET} in ${REGION}"
            if [ "${REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}"
            else
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}" \
                --create-bucket-configuration LocationConstraint="${REGION}"
            fi
            aws s3api put-bucket-versioning --bucket "${BUCKET}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "${BUCKET}" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}'
            aws s3api put-public-access-block --bucket "${BUCKET}" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
          else
            echo "State bucket already exists: ${BUCKET}"
          fi

          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}"  >> "$GITHUB_OUTPUT"
          echo "State path: s3://${BUCKET}/services/${{ env.TARGET_ENV }}/terraform.tfstate"

      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=services/${{ env.TARGET_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ steps.backend.outputs.region }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      # Import pre-existing AWS resources BEFORE planning so the saved plan
      # matches the state Terraform will see on apply. The script checks AWS
      # for each resource first — it skips resources that don't exist yet
      # (fresh deployment) and skips those already in state (idempotent).
      - name: Import existing AWS resources
        if: env.TF_ACTION == 'apply'
        working-directory: infrastructure/services
        run: |
          bash ../../scripts/import-existing-resources.sh \
            "${{ env.TARGET_ENV }}"
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ secrets.AWS_REGION_CUSTOM }}" \
            -var="environment=${{ env.TARGET_ENV }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -out=tfplan \
            -no-color
        continue-on-error: false

      - name: Terraform Apply
        if: env.TF_ACTION == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Output endpoint URLs
        if: env.TF_ACTION == 'apply'
        run: terraform output -no-color

      - name: Summarize API Gateway endpoints
        if: env.TF_ACTION == 'apply'
        shell: bash
        run: |
          echo "Service API endpoints (copy values into deployment secrets as needed):"
          terraform output -json service_api_endpoints
          echo ""
          echo "Service API Gateway IDs:"
          terraform output -json service_api_gateway_ids

          {
            echo "## Service API Endpoints"
            echo ''
            echo '```json'
            terraform output -json service_api_endpoints
            echo '```'
            echo ''
            echo '## Service API Gateway IDs'
            echo ''
            echo '```json'
            terraform output -json service_api_gateway_ids
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
