name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string

concurrency:
  group: cloudformation-${{ inputs.environment || github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TARGET_ENV: ${{ inputs.environment || github.event.inputs.environment }}
  STACK_NAME: art-management-tool-${{ inputs.environment || github.event.inputs.environment }}
  TEMPLATES_BUCKET: art-management-cfn-templates

permissions:
  contents: read

jobs:
  deploy:
    name: CloudFormation Deploy (${{ inputs.environment || github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.event.inputs.environment }}

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.JWT_SECRET }}" ] && MISSING="${MISSING} JWT_SECRET"
          [ -z "${{ secrets.LAMBDA_BUCKET }}" ] && MISSING="${MISSING} LAMBDA_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_CUSTOM }}

      # -------------------------------------------------------------------
      # Ensure CFN templates S3 bucket exists
      # -------------------------------------------------------------------
      - name: Bootstrap templates bucket
        id: bucket
        run: |
          REGION="${{ secrets.AWS_REGION_CUSTOM }}"
          BUCKET="${{ env.TEMPLATES_BUCKET }}"

          if ! aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            echo "Creating templates bucket: ${BUCKET} in ${REGION}"
            if [ "${REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}"
            else
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}" \
                --create-bucket-configuration LocationConstraint="${REGION}"
            fi
            aws s3api put-bucket-versioning --bucket "${BUCKET}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "${BUCKET}" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}'
            aws s3api put-public-access-block --bucket "${BUCKET}" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
          else
            echo "Templates bucket already exists: ${BUCKET}"
          fi

          BUCKET_URL="https://s3.${{ secrets.AWS_REGION_CUSTOM }}.amazonaws.com/${BUCKET}"
          echo "bucket_url=${BUCKET_URL}" >> "$GITHUB_OUTPUT"
          echo "Templates URL prefix: ${BUCKET_URL}"

      # -------------------------------------------------------------------
      # Upload nested templates to S3
      # -------------------------------------------------------------------
      - name: Upload nested templates
        run: |
          aws s3 sync infrastructure/nested/ \
            "s3://${{ env.TEMPLATES_BUCKET }}/nested/" \
            --delete

      # -------------------------------------------------------------------
      # Create Lambda placeholder ZIP if needed
      # -------------------------------------------------------------------
      - name: Create Lambda placeholder
        run: |
          if ! aws s3 ls "s3://${{ secrets.LAMBDA_BUCKET }}/lambda-placeholder.zip" 2>/dev/null; then
            echo 'exports.handler = async (event) => ({ statusCode: 200, body: JSON.stringify({ message: "placeholder - deploy via CI/CD" }) });' > /tmp/index.js
            cd /tmp && zip lambda-placeholder.zip index.js
            aws s3 cp /tmp/lambda-placeholder.zip "s3://${{ secrets.LAMBDA_BUCKET }}/lambda-placeholder.zip"
            echo "Uploaded lambda-placeholder.zip"
          else
            echo "lambda-placeholder.zip already exists"
          fi

      # -------------------------------------------------------------------
      # Validate all templates
      # -------------------------------------------------------------------
      - name: Validate templates
        run: |
          echo "Validating root-stack.yaml..."
          aws cloudformation validate-template \
            --template-body file://infrastructure/root-stack.yaml \
            --no-cli-pager

          for tmpl in infrastructure/nested/*.yaml; do
            echo "Validating ${tmpl}..."
            aws cloudformation validate-template \
              --template-body "file://${tmpl}" \
              --no-cli-pager
          done

      # -------------------------------------------------------------------
      # Handle ROLLBACK_COMPLETE state
      # -------------------------------------------------------------------
      - name: Clean up failed stack if needed
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
            echo "Stack is in ${STACK_STATUS} state. Deleting before re-deploy..."
            aws cloudformation delete-stack --stack-name "${{ env.STACK_NAME }}"
            aws cloudformation wait stack-delete-complete --stack-name "${{ env.STACK_NAME }}"
            echo "Stack deleted successfully."
          else
            echo "Stack status: ${STACK_STATUS} — proceeding."
          fi

      # -------------------------------------------------------------------
      # Build parameter overrides
      # -------------------------------------------------------------------
      - name: Build parameter overrides
        id: params
        run: |
          OVERRIDES="ParameterKey=JwtSecret,ParameterValue=${{ secrets.JWT_SECRET }}"
          OVERRIDES="${OVERRIDES} ParameterKey=TemplatesBucketUrl,ParameterValue=${{ steps.bucket.outputs.bucket_url }}"
          OVERRIDES="${OVERRIDES} ParameterKey=LambdaCodeS3Bucket,ParameterValue=${{ secrets.LAMBDA_BUCKET }}"
          OVERRIDES="${OVERRIDES} ParameterKey=AdminEmail,ParameterValue=${{ secrets.ADMIN_EMAIL || 'samuel.haddar96@gmail.com' }}"
          OVERRIDES="${OVERRIDES} ParameterKey=Environment,ParameterValue=${{ env.TARGET_ENV }}"

          # Load additional params from file if it exists
          PARAMS_FILE="infrastructure/params/${{ env.TARGET_ENV }}.json"
          if [ -f "${PARAMS_FILE}" ]; then
            # Extract param overrides from JSON, skipping keys already set above
            SKIP_KEYS="JwtSecret|TemplatesBucketUrl|LambdaCodeS3Bucket|AdminEmail|Environment"
            EXTRA=$(python3 -c "
          import json, sys, re
          skip = set(re.split(r'\|', '${SKIP_KEYS}'))
          with open('${PARAMS_FILE}') as f:
              params = json.load(f)
          for p in params:
              if p['ParameterKey'] not in skip:
                  print(f\"ParameterKey={p['ParameterKey']},ParameterValue={p['ParameterValue']}\")
          " 2>/dev/null || true)
            if [ -n "${EXTRA}" ]; then
              OVERRIDES="${OVERRIDES} ${EXTRA}"
            fi
          fi

          echo "overrides=${OVERRIDES}" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # Deploy CloudFormation stack
      # -------------------------------------------------------------------
      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/root-stack.yaml \
            --stack-name "${{ env.STACK_NAME }}" \
            --parameter-overrides ${{ steps.params.outputs.overrides }} \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --tags "Project=art-management-tool" "Environment=${{ env.TARGET_ENV }}" "ManagedBy=cloudformation" \
            --no-fail-on-empty-changeset

      # -------------------------------------------------------------------
      # Validate outputs
      # -------------------------------------------------------------------
      - name: Output stack values
        if: success()
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs" \
            --output table \
            --no-cli-pager

      - name: Summarize API endpoints
        if: success()
        shell: bash
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs" \
            --output json --no-cli-pager)

          get_output() {
            echo "${OUTPUTS}" | python3 -c "
          import json, sys
          outputs = json.load(sys.stdin)
          for o in (outputs or []):
              if o['OutputKey'] == '$1':
                  print(o['OutputValue'])
                  break
          " 2>/dev/null || echo "N/A"
          }

          PRODUCT_URL=$(get_output ProductServiceApiEndpoint)
          CART_URL=$(get_output CartServiceApiEndpoint)
          ORDER_URL=$(get_output OrderServiceApiEndpoint)
          CONTENT_URL=$(get_output ContentServiceApiEndpoint)
          DISCOUNT_URL=$(get_output DiscountServiceApiEndpoint)
          NOTIFICATION_URL=$(get_output NotificationServiceApiEndpoint)
          INTEGRATION_URL=$(get_output IntegrationServiceApiEndpoint)
          AUDIT_URL=$(get_output AuditServiceApiEndpoint)

          {
            echo "## Service API Endpoints"
            echo ""
            echo "| Service | Endpoint |"
            echo "|---------|----------|"
            echo "| Product | ${PRODUCT_URL} |"
            echo "| Cart | ${CART_URL} |"
            echo "| Order | ${ORDER_URL} |"
            echo "| Content | ${CONTENT_URL} |"
            echo "| Discount | ${DISCOUNT_URL} |"
            echo "| Notification | ${NOTIFICATION_URL} |"
            echo "| Integration | ${INTEGRATION_URL} |"
            echo "| Audit | ${AUDIT_URL} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------------------------------
      # Failure diagnostics
      # -------------------------------------------------------------------
      - name: Diagnose failure
        if: failure()
        run: |
          echo "Stack events (last 20):"
          aws cloudformation describe-stack-events \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "StackEvents[:20].[Timestamp,ResourceStatus,ResourceType,LogicalResourceId,ResourceStatusReason]" \
            --output table \
            --no-cli-pager 2>/dev/null || echo "Unable to fetch stack events"
