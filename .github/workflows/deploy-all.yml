name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      deploy_infrastructure:
        description: 'Run CloudFormation deploy before deploying services (recommended for new or changed environments)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  infrastructure:
    name: Deploy Infrastructure
    if: inputs.deploy_infrastructure
    uses: ./.github/workflows/deploy-infrastructure.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  deploy-services:
    name: Deploy All Lambda Services
    needs: [infrastructure]
    if: always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      NODE_VERSION: '20'
      AWS_REGION_CUSTOM: ${{ secrets.AWS_REGION_CUSTOM }}
      PROJECT_NAME: 'art-management-tool'
      DEPLOY_ENV: ${{ inputs.environment }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: product-service
            esbuild_arg: product
            functions: >-
              product-service-health
              product-service-list-products
              product-service-get-product
              product-service-create-product
              product-service-update-product
              product-service-delete-product
              product-service-list-categories
              product-service-get-category
              product-service-create-category
              product-service-update-category
              product-service-delete-category
              product-service-list-variants
              product-service-create-variant
              product-service-update-variant
              product-service-update-stock
              product-service-get-upload-url
              product-service-list-images
              product-service-delete-image
          - name: cart-service
            esbuild_arg: cart
            functions: >-
              cart-service-get-cart
              cart-service-add-item
              cart-service-update-quantity
              cart-service-remove-item
              cart-service-clear-cart
              cart-service-apply-discount
              cart-service-remove-discount
          - name: order-service
            esbuild_arg: order
            functions: >-
              order-service-create-order
              order-service-get-order
              order-service-get-customer-orders
              order-service-list-orders
              order-service-update-status
              order-service-process-payment
              order-service-webhook
          - name: content-service
            esbuild_arg: content
            functions: >-
              content-service-list-personaggi
              content-service-get-personaggio
              content-service-create-personaggio
              content-service-update-personaggio
              content-service-delete-personaggio
              content-personaggio-upload-url
              content-service-list-fumetti
              content-service-get-fumetto
              content-service-create-fumetto
              content-service-update-fumetto
              content-service-delete-fumetto
              content-service-get-fumetto-upload-url
              content-service-temp-upload-presign
          - name: audit-service
            esbuild_arg: audit
            functions: >-
              audit-service-get-entity-history
              audit-service-get-user-activity
              audit-service-get-activity-by-date
          - name: discount-service
            esbuild_arg: discount
            functions: >-
              discount-service-validate-code
              discount-service-list-discounts
              discount-service-get-discount
              discount-service-create-discount
              discount-service-update-discount
              discount-service-delete-discount
              discount-service-get-stats
          - name: notification-service
            esbuild_arg: notification
            functions: >-
              notification-service-list-notifications
              notification-service-mark-as-read
              notification-service-mark-all-read
              notification-delete
          - name: integration-service
            esbuild_arg: integration
            functions: >-
              integration-service-etsy-initiate-oauth
              integration-etsy-callback
              integration-service-etsy-sync-products
              integration-service-etsy-sync-inventory
              integration-service-etsy-sync-orders
              integration-service-etsy-webhook
              integration-service-etsy-scheduled-sync

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.LAMBDA_BUCKET }}" ] && MISSING="${MISSING} LAMBDA_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Run tests
        working-directory: backend
        run: npm test -- --testPathPatterns="services/${{ matrix.service.name }}" --passWithNoTests

      - name: Build service (esbuild)
        working-directory: backend
        run: node esbuild.lambda.mjs ${{ matrix.service.esbuild_arg }}

      - name: Package Lambda
        run: |
          cd backend/dist/lambda/${{ matrix.service.name }}
          zip -r /tmp/lambda.zip . -q
          echo "PACKAGE_SIZE=$(du -sh /tmp/lambda.zip | cut -f1)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_CUSTOM }}

      - name: Ensure Lambda artifact bucket exists
        shell: bash
        env:
          LAMBDA_BUCKET: ${{ secrets.LAMBDA_BUCKET }}
        run: |
          if aws s3api head-bucket --bucket "${LAMBDA_BUCKET}" 2>/dev/null; then
            echo "Lambda artifact bucket already exists: ${LAMBDA_BUCKET}"
          else
            echo "Creating Lambda artifact bucket: ${LAMBDA_BUCKET} in ${{ env.AWS_REGION_CUSTOM }}"
            if [ "${{ env.AWS_REGION_CUSTOM }}" = "us-east-1" ]; then
              CREATE_ARGS=(--bucket "${LAMBDA_BUCKET}" --region "${{ env.AWS_REGION_CUSTOM }}")
            else
              CREATE_ARGS=(
                --bucket "${LAMBDA_BUCKET}"
                --region "${{ env.AWS_REGION_CUSTOM }}"
                --create-bucket-configuration "LocationConstraint=${{ env.AWS_REGION_CUSTOM }}"
              )
            fi

            if ! aws s3api create-bucket "${CREATE_ARGS[@]}"; then
              if ! aws s3api head-bucket --bucket "${LAMBDA_BUCKET}" 2>/dev/null; then
                echo "::error::Unable to access or create S3 bucket ${LAMBDA_BUCKET}"
                exit 1
              fi
              echo "Bucket became available during bootstrap: ${LAMBDA_BUCKET}"
            fi
          fi

          aws s3api put-bucket-versioning --bucket "${LAMBDA_BUCKET}" \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "${LAMBDA_BUCKET}" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}'
          aws s3api put-public-access-block --bucket "${LAMBDA_BUCKET}" \
            --public-access-block-configuration \
            'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

      - name: Upload Lambda package to S3
        id: upload_package
        run: |
          S3_KEY="${{ matrix.service.name }}/${{ env.DEPLOY_ENV }}/${{ github.sha }}.zip"
          aws s3 cp /tmp/lambda.zip "s3://${{ secrets.LAMBDA_BUCKET }}/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

      - name: Wait for Lambda functions to become available
        run: |
          FUNCTIONS="${{ matrix.service.functions }}"
          MISSING=""

          for FN_SUFFIX in $FUNCTIONS; do
            FN="${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-${FN_SUFFIX}"
            READY=false

            for attempt in 1 2 3 4 5 6; do
              if aws lambda get-function --function-name "$FN" >/dev/null 2>&1; then
                READY=true
                break
              fi

              echo "Waiting for ${FN} to become available (attempt ${attempt}/6)..."
              sleep 10
            done

            if [ "$READY" != "true" ]; then
              MISSING="${MISSING} ${FN}"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Missing Lambda functions:${MISSING}"
            echo "Deploy infrastructure for ${{ env.DEPLOY_ENV }} and rerun once the functions exist."
            exit 1
          fi

      - name: Update Lambda functions
        id: update_lambda
        run: |
          FUNCTIONS="${{ matrix.service.functions }}"
          set +e
          FAILED=0
          ANY_UPDATED=false
          for FN_SUFFIX in $FUNCTIONS; do
            FN="${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-${FN_SUFFIX}"
            echo "Updating ${FN}..."
            if aws lambda update-function-code \
              --function-name "$FN" \
              --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
              --s3-key "${{ steps.upload_package.outputs.s3_key }}" \
              --no-cli-pager; then
              aws lambda wait function-updated --function-name "$FN"
              ANY_UPDATED=true
            else
              echo "::error::Failed to update ${FN}"
              FAILED=1
            fi
          done
          echo "any_updated=${ANY_UPDATED}" >> $GITHUB_OUTPUT
          exit $FAILED

      - name: Tag previous version in S3
        if: success()
        run: |
          aws s3 cp \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ steps.upload_package.outputs.s3_key }}" \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ matrix.service.name }}/${{ env.DEPLOY_ENV }}/previous.zip" || true

      - name: Rollback on failure
        if: failure() && steps.update_lambda.outputs.any_updated == 'true'
        run: |
          echo "Rolling back ${{ matrix.service.name }}..."
          PREV_S3_KEY="${{ matrix.service.name }}/${{ env.DEPLOY_ENV }}/previous.zip"
          if aws s3 ls "s3://${{ secrets.LAMBDA_BUCKET }}/${PREV_S3_KEY}" 2>/dev/null; then
            FUNCTIONS="${{ matrix.service.functions }}"
            for FN_SUFFIX in $FUNCTIONS; do
              FN="${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-${FN_SUFFIX}"
              aws lambda update-function-code \
                --function-name "$FN" \
                --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
                --s3-key "${PREV_S3_KEY}" \
                --no-cli-pager || true
            done
            echo "Rollback completed"
          else
            echo "No previous version found for rollback"
          fi

  verify-service-apis:
    name: Verify Service API Endpoints
    needs: [deploy-services]
    if: needs.deploy-services.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION_CUSTOM: ${{ secrets.AWS_REGION_CUSTOM }}
      PROJECT_NAME: art-management-tool
      DEPLOY_ENV: ${{ inputs.environment }}

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_CUSTOM }}

      - name: Discover service API endpoints
        id: discover
        shell: bash
        run: |
          get_stack_output() {
            local output_key="$1"
            local output
            output=$(aws cloudformation describe-stacks \
              --stack-name "${PROJECT_NAME}-root" \
              --region "${AWS_REGION_CUSTOM}" \
              --query "Stacks[0].Outputs[?OutputKey=='${output_key}'].OutputValue | [0]" \
              --output text 2>/dev/null || true)
            echo "${output}"
          }

          SHARED_API_ID=$(get_stack_output "AuthApiId")
          SHARED_API_URL=$(get_stack_output "AuthApiEndpoint")

          if [ -n "${SHARED_API_ID}" ] && [ "${SHARED_API_ID}" != "None" ] && [ -n "${SHARED_API_URL}" ] && [ "${SHARED_API_URL}" != "None" ]; then
            PRODUCT_API_ID="${SHARED_API_ID}"
            CART_API_ID="${SHARED_API_ID}"
            PRODUCT_BASE_URL="${SHARED_API_URL}"
            CART_BASE_URL="${SHARED_API_URL}"
            echo "Using shared API endpoint: ${SHARED_API_URL}"
          else
            PRODUCT_API_NAME="${PROJECT_NAME}-${DEPLOY_ENV}-product-service-api"
            PRODUCT_API_ID=$(aws apigatewayv2 get-apis \
              --region "${AWS_REGION_CUSTOM}" \
              --query "Items[?Name=='${PRODUCT_API_NAME}'].ApiId | [0]" \
              --output text)

            CART_API_NAME="${PROJECT_NAME}-${DEPLOY_ENV}-cart-service-api"
            CART_API_ID=$(aws apigatewayv2 get-apis \
              --region "${AWS_REGION_CUSTOM}" \
              --query "Items[?Name=='${CART_API_NAME}'].ApiId | [0]" \
              --output text)

            if [ -z "${PRODUCT_API_ID}" ] || [ "${PRODUCT_API_ID}" = "None" ]; then
              echo "::error::Product API not found: ${PRODUCT_API_NAME}"
              exit 1
            fi

            if [ -z "${CART_API_ID}" ] || [ "${CART_API_ID}" = "None" ]; then
              echo "::error::Cart API not found: ${CART_API_NAME}"
              exit 1
            fi

            PRODUCT_BASE_URL="https://${PRODUCT_API_ID}.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com"
            CART_BASE_URL="https://${CART_API_ID}.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com"
            echo "Shared endpoint not found, using per-service fallback"
          fi

          echo "product_api_id=${PRODUCT_API_ID}" >> "$GITHUB_OUTPUT"
          echo "cart_api_id=${CART_API_ID}" >> "$GITHUB_OUTPUT"
          echo "product_base_url=${PRODUCT_BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "cart_base_url=${CART_BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Discovered product API endpoint: ${PRODUCT_BASE_URL}"
          echo "Discovered cart API endpoint: ${CART_BASE_URL}"

      - name: Smoke test service API routes
        shell: bash
        env:
          PRODUCT_BASE_URL: ${{ steps.discover.outputs.product_base_url }}
          CART_BASE_URL: ${{ steps.discover.outputs.cart_base_url }}
        run: |
          check_status() {
            local base_url="$1"
            local path="$2"
            local url="${base_url}${path}"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "${url} -> ${status}"
            if [ "$status" = "000" ] || [ "$status" = "404" ]; then
              echo "::error::Service API check failed for ${url} (status ${status})."
              exit 1
            fi
          }

          check_status "${PRODUCT_BASE_URL}" "/health"
          check_status "${PRODUCT_BASE_URL}" "/api/products"
          check_status "${CART_BASE_URL}" "/api/cart"

      - name: Deployment summary
        shell: bash
        env:
          PRODUCT_BASE_URL: ${{ steps.discover.outputs.product_base_url }}
          PRODUCT_API_ID: ${{ steps.discover.outputs.product_api_id }}
          CART_BASE_URL: ${{ steps.discover.outputs.cart_base_url }}
          CART_API_ID: ${{ steps.discover.outputs.cart_api_id }}
        run: |
          echo "✅ Service API endpoints verified"
          {
            echo "## Service API Verification"
            echo ''
            echo "- product API ID: ${PRODUCT_API_ID}"
            echo "- product endpoint: ${PRODUCT_BASE_URL}"
            echo "- cart API ID: ${CART_API_ID}"
            echo "- cart endpoint: ${CART_BASE_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
