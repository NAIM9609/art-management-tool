name: Deploy Content Service

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '20'
  AWS_REGION_CUSTOM: ${{ secrets.AWS_REGION_CUSTOM }}
  PROJECT_NAME: 'art-management-tool'
  SERVICE_NAME: 'content-service'
  SERVICE_PATH: 'backend/services/content-service'
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Content Service (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      DEPLOY_ENV: ${{ inputs.environment }}

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.LAMBDA_BUCKET }}" ] && MISSING="${MISSING} LAMBDA_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Run tests
        working-directory: backend
        run: npm test -- --testPathPatterns="services/content-service" --passWithNoTests

      - name: Build service (esbuild)
        working-directory: backend
        run: node esbuild.lambda.mjs content

      - name: Package Lambda
        run: |
          cd backend/dist/lambda/content-service
          zip -r /tmp/lambda.zip . -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_CUSTOM }}

      - name: Ensure Lambda artifact bucket exists
        shell: bash
        env:
          LAMBDA_BUCKET: ${{ secrets.LAMBDA_BUCKET }}
        run: |
          if aws s3api head-bucket --bucket "${LAMBDA_BUCKET}" 2>/dev/null; then
            echo "Lambda artifact bucket already exists: ${LAMBDA_BUCKET}"
          else
            echo "Creating Lambda artifact bucket: ${LAMBDA_BUCKET} in ${{ env.AWS_REGION_CUSTOM }}"
            if [ "${{ env.AWS_REGION_CUSTOM }}" = "us-east-1" ]; then
              CREATE_ARGS=(--bucket "${LAMBDA_BUCKET}" --region "${{ env.AWS_REGION_CUSTOM }}")
            else
              CREATE_ARGS=(
                --bucket "${LAMBDA_BUCKET}"
                --region "${{ env.AWS_REGION_CUSTOM }}"
                --create-bucket-configuration "LocationConstraint=${{ env.AWS_REGION_CUSTOM }}"
              )
            fi

            if ! aws s3api create-bucket "${CREATE_ARGS[@]}"; then
              if ! aws s3api head-bucket --bucket "${LAMBDA_BUCKET}" 2>/dev/null; then
                echo "::error::Unable to access or create S3 bucket ${LAMBDA_BUCKET}"
                exit 1
              fi
              echo "Bucket became available during bootstrap: ${LAMBDA_BUCKET}"
            fi
          fi

          aws s3api put-bucket-versioning --bucket "${LAMBDA_BUCKET}" \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket "${LAMBDA_BUCKET}" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"},"BucketKeyEnabled":true}]}'
          aws s3api put-public-access-block --bucket "${LAMBDA_BUCKET}" \
            --public-access-block-configuration \
            'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

      - name: Upload Lambda package to S3
        id: upload_package
        run: |
          S3_KEY="${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/${{ github.sha }}.zip"
          aws s3 cp /tmp/lambda.zip "s3://${{ secrets.LAMBDA_BUCKET }}/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

      - name: Update Lambda function code
        id: update_lambda
        run: |
          FUNCTIONS=(
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-list-personaggi"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-personaggio"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-create-personaggio"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-update-personaggio"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-delete-personaggio"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-personaggio-upload-url"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-list-fumetti"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-fumetto"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-create-fumetto"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-update-fumetto"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-delete-fumetto"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-fumetto-upload-url"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-temp-upload-presign"
          )
          set +e
          FAILED=0
          ANY_UPDATED=false
          for FN in "${FUNCTIONS[@]}"; do
            echo "Updating ${FN}..."
            if aws lambda update-function-code \
              --function-name "$FN" \
              --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
              --s3-key "${{ steps.upload_package.outputs.s3_key }}" \
              --no-cli-pager; then
              aws lambda wait function-updated --function-name "$FN"
              ANY_UPDATED=true
            else
              echo "::error::Failed to update ${FN}"
              FAILED=1
            fi
          done
          echo "any_updated=${ANY_UPDATED}" >> $GITHUB_OUTPUT
          exit $FAILED

      - name: Run smoke tests
        id: smoke_test
        run: |
          API_URL="${{ secrets.API_GATEWAY_URL }}"
          if [ -z "$API_URL" ]; then
            echo "API_GATEWAY_URL not set, skipping smoke tests"
            exit 0
          fi
          echo "Running smoke tests against ${API_URL}..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${API_URL}/api/personaggi" || echo "000")
          FIRST_DIGIT="${HTTP_STATUS:0:1}"
          if [ "$HTTP_STATUS" = "000" ] || ([ "$FIRST_DIGIT" != "2" ] && [ "$FIRST_DIGIT" != "3" ]); then
            echo "Smoke test failed: HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Smoke test passed: HTTP ${HTTP_STATUS}"

      - name: Rollback on failure
        if: failure() && steps.update_lambda.outputs.any_updated == 'true'
        run: |
          echo "Rolling back due to failure..."
          PREV_S3_KEY="${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/previous.zip"
          if aws s3 ls "s3://${{ secrets.LAMBDA_BUCKET }}/${PREV_S3_KEY}" 2>/dev/null; then
            FUNCTIONS=(
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-list-personaggi"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-personaggio"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-create-personaggio"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-update-personaggio"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-delete-personaggio"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-personaggio-upload-url"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-list-fumetti"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-fumetto"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-create-fumetto"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-update-fumetto"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-delete-fumetto"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-get-fumetto-upload-url"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-content-service-temp-upload-presign"
            )
            for FN in "${FUNCTIONS[@]}"; do
              aws lambda update-function-code \
                --function-name "$FN" \
                --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
                --s3-key "${PREV_S3_KEY}" \
                --no-cli-pager || true
            done
            echo "Rollback completed"
          else
            echo "No previous version found for rollback"
          fi

      - name: Tag previous version in S3
        if: success()
        run: |
          aws s3 cp \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ steps.upload_package.outputs.s3_key }}" \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/previous.zip" || true

      - name: Notify Slack on success
        if: success() && startsWith(env.SLACK_WEBHOOK_URL, 'https://')
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *${{ env.SERVICE_NAME }}* deployed to *${{ env.DEPLOY_ENV }}*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure() && startsWith(env.SLACK_WEBHOOK_URL, 'https://')
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *${{ env.SERVICE_NAME }}* deployment FAILED on *${{ env.DEPLOY_ENV }}*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
