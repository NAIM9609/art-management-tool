name: Data Migration Dry Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for dry run'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - dev
      spot_check_sample_size:
        description: 'Number of records to spot-check per entity'
        required: false
        default: '5'
        type: string
      run_rollback_test:
        description: 'Execute rollback procedure after migration'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_ENDPOINT_URL: http://localhost:4566

permissions:
  contents: read

jobs:
  migration-dry-run:
    name: Migration Dry Run (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: art_management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      localstack:
        image: localstack/localstack:3.8.1
        env:
          SERVICES: dynamodb
          DEBUG: 0
          AWS_DEFAULT_REGION: us-east-1
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: art_management
      DATABASE_SSL_MODE: disable
      SPOT_CHECK_SAMPLE_SIZE: ${{ github.event.inputs.spot_check_sample_size || '5' }}
      ROLLBACK_CONFIRM_CLEAR: 'true'
      DYNAMODB_TABLE_NAME: art-management-tool-${{ github.event.inputs.environment || 'staging' }}-art-management

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm i

      # ── 1. Setup Staging Environment ─────────────────────────────────────
      - name: Wait for LocalStack
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:4566/_localstack/health; do sleep 2; done'
          echo "LocalStack is ready"

      - name: Create DynamoDB staging table
        run: |
          aws --endpoint-url=http://localhost:4566 dynamodb create-table \
            --table-name "$DYNAMODB_TABLE_NAME" \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
              AttributeName=GSI2PK,AttributeType=S \
              AttributeName=GSI2SK,AttributeType=S \
              AttributeName=GSI3PK,AttributeType=S \
              AttributeName=GSI3SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --global-secondary-indexes \
              'IndexName=GSI1,KeySchema=[{AttributeName=GSI1PK,KeyType=HASH},{AttributeName=GSI1SK,KeyType=RANGE}],Projection={ProjectionType=ALL}' \
              'IndexName=GSI2,KeySchema=[{AttributeName=GSI2PK,KeyType=HASH},{AttributeName=GSI2SK,KeyType=RANGE}],Projection={ProjectionType=ALL}' \
              'IndexName=GSI3,KeySchema=[{AttributeName=GSI3PK,KeyType=HASH},{AttributeName=GSI3SK,KeyType=RANGE}],Projection={ProjectionType=ALL}' \
            --billing-mode PAY_PER_REQUEST \
            --region us-east-1
          echo "DynamoDB staging table created: $DYNAMODB_TABLE_NAME"
          echo "Waiting for DynamoDB staging table to exist: $DYNAMODB_TABLE_NAME"
          aws --endpoint-url=http://localhost:4566 dynamodb wait table-exists \
            --table-name "$DYNAMODB_TABLE_NAME" \
            --region us-east-1
          echo "Waiting for DynamoDB staging table to become ACTIVE..."
          until [ "$(aws --endpoint-url=http://localhost:4566 dynamodb describe-table \
            --table-name "$DYNAMODB_TABLE_NAME" \
            --region us-east-1 \
            --query 'Table.TableStatus' \
            --output text)" = "ACTIVE" ]; do
            echo "Table status is not ACTIVE yet. Sleeping for 5 seconds..."
            sleep 5
          done
          echo "DynamoDB staging table is ACTIVE: $DYNAMODB_TABLE_NAME"

      # ── 2. Initialize PostgreSQL schema and seed test data ───────────────
      - name: Initialize PostgreSQL schema
        working-directory: backend
        run: |
          echo "Initializing full PostgreSQL schema via TypeORM synchronize…"
          npx ts-node -e "
            const { initializeDatabase, closeDatabase } = require('./src/database/connection');
            initializeDatabase().then(closeDatabase).then(() => { console.log('Schema initialized'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); });
          "
          echo "Schema initialization complete"

      - name: Wait for PostgreSQL and seed test data
        run: |
          echo "Seeding PostgreSQL with test data for dry run…"
          PGPASSWORD=postgres psql -h localhost -U postgres -d art_management -c "
            CREATE TABLE IF NOT EXISTS categories (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              slug VARCHAR(255) UNIQUE NOT NULL,
              description TEXT,
              parent_id INTEGER,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              deleted_at TIMESTAMPTZ
            );
            CREATE TABLE IF NOT EXISTS products (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              slug VARCHAR(255) UNIQUE NOT NULL,
              description TEXT,
              price NUMERIC(10,2) NOT NULL DEFAULT 0,
              status VARCHAR(50) NOT NULL DEFAULT 'draft',
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              deleted_at TIMESTAMPTZ
            );

            INSERT INTO categories (name, slug, description)
            VALUES
              ('Paintings', 'paintings', 'Original paintings'),
              ('Prints', 'prints', 'Art prints'),
              ('Sculptures', 'sculptures', 'Three-dimensional art')
            ON CONFLICT (slug) DO NOTHING;

            INSERT INTO products (name, slug, description, price, status)
            VALUES
              ('Sunset Landscape', 'sunset-landscape', 'Oil painting of a sunset', 299.99, 'active'),
              ('Abstract Blue', 'abstract-blue', 'Abstract acrylic painting', 199.99, 'active'),
              ('Winter Scene Print', 'winter-scene-print', 'Limited edition print', 49.99, 'active')
            ON CONFLICT (slug) DO NOTHING;

            SELECT 'Categories: ' || COUNT(*) FROM categories;
            SELECT 'Products: ' || COUNT(*) FROM products;
          "
          echo "Test data seeded"

      # ── 2. Pre-migration Backup (Rollback Mode: backup) ───────────────────
      - name: Take pre-migration PostgreSQL backup
        working-directory: backend
        run: |
          mkdir -p ../backups
          BACKUP_DIR=../backups \
          ROLLBACK_MODE=backup \
          npx ts-node scripts/rollback-migration.ts
          echo "Pre-migration backup complete"
          ls -lh ../backups/

      # ── 3. Run Migration with Timing ─────────────────────────────────────
      - name: Run migration (timed)
        id: migration
        working-directory: backend
        run: |
          echo "Starting PostgreSQL → DynamoDB migration…"
          START_TIME=$(date +%s)

          npx ts-node scripts/migrate-to-dynamodb.ts 2>&1 | tee /tmp/migration.log
          EXIT_CODE=${PIPESTATUS[0]}

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "migration_duration=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "migration_exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Migration finished in ${DURATION}s (exit code: ${EXIT_CODE})"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Migration script failed with exit code ${EXIT_CODE}"
            exit $EXIT_CODE
          fi

      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-log-${{ github.run_id }}
          path: /tmp/migration.log
          retention-days: 30

      # ── 4. Validate Migration ─────────────────────────────────────────────
      - name: Run migration validation
        id: validation
        working-directory: backend
        run: |
          echo "Running migration validation…"
          npx ts-node scripts/validate-migration.ts 2>&1 | tee /tmp/validation.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "validation_exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Validation finished (exit code: ${EXIT_CODE})"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Migration validation failed with exit code ${EXIT_CODE}"
            exit $EXIT_CODE
          fi

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log-${{ github.run_id }}
          path: /tmp/validation.log
          retention-days: 30

      # ── 5. Rollback Test ──────────────────────────────────────────────────
      - name: Run rollback test (clear DynamoDB)
        if: ${{ github.event.inputs.run_rollback_test != 'false' }}
        working-directory: backend
        run: |
          echo "Testing rollback: clearing DynamoDB table…"
          ROLLBACK_MODE=clear \
          ROLLBACK_CONFIRM_CLEAR=true \
          npx ts-node scripts/rollback-migration.ts
          echo "DynamoDB cleared"

      - name: Run rollback test (restore PostgreSQL)
        if: ${{ github.event.inputs.run_rollback_test != 'false' }}
        working-directory: backend
        run: |
          echo "Testing rollback: restoring PostgreSQL from backup…"
          BACKUP_DIR=../backups \
          ROLLBACK_MODE=restore \
          npx ts-node scripts/rollback-migration.ts 2>&1 | tee /tmp/rollback.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Rollback restore finished (exit code: ${EXIT_CODE})"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Rollback restore failed with exit code ${EXIT_CODE}"
            exit $EXIT_CODE
          fi

      - name: Verify PostgreSQL data integrity after rollback
        if: ${{ github.event.inputs.run_rollback_test != 'false' }}
        run: |
          echo "Verifying PostgreSQL data integrity after rollback…"
          CAT_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres -d art_management -t -c "SELECT COUNT(*) FROM categories;" | xargs)
          PROD_COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres -d art_management -t -c "SELECT COUNT(*) FROM products;" | xargs)
          echo "  categories: ${CAT_COUNT} rows"
          echo "  products:   ${PROD_COUNT} rows"
          if [ "$CAT_COUNT" -lt 1 ] || [ "$PROD_COUNT" -lt 1 ]; then
            echo "::error::PostgreSQL data integrity check failed after rollback"
            exit 1
          fi
          echo "PostgreSQL data integrity verified"

      - name: Upload rollback log
        if: ${{ github.event.inputs.run_rollback_test != 'false' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rollback-log-${{ github.run_id }}
          path: /tmp/rollback.log
          retention-days: 30

      # ── 6. Summary ────────────────────────────────────────────────────────
      - name: Generate dry run summary
        if: always()
        run: |
          DURATION="${{ steps.migration.outputs.migration_duration }}"
          MIG_RC="${{ steps.migration.outputs.migration_exit_code }}"
          VAL_RC="${{ steps.validation.outputs.validation_exit_code }}"

          echo "## Data Migration Dry Run Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging environment setup | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-migration backup | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${MIG_RC:-1}" = "0" ]; then
            echo "| Migration (${DURATION}s) | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Migration | ❌ (see migration log) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${VAL_RC:-1}" = "0" ]; then
            echo "| Validation | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Validation | ❌ (see validation log) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event.inputs.run_rollback_test }}" = "false" ]; then
            echo "| Rollback test | ⏭ skipped |" >> "$GITHUB_STEP_SUMMARY"
          elif [ -f /tmp/rollback.log ]; then
            echo "| Rollback test | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Rollback test | ❌ (see rollback log) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Migration duration:** ${DURATION}s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts: migration-log, validation-log, rollback-log uploaded for review." >> "$GITHUB_STEP_SUMMARY"
