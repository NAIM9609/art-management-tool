name: CloudFormation Validate

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/cfn-validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/cfn-validate.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint root stack
        run: cfn-lint infrastructure/root-stack.yaml

      - name: Lint nested templates
        run: cfn-lint infrastructure/nested/*.yaml

      - name: Validate YAML syntax
        run: |
          python3 -c "import glob,yaml; from yaml.nodes import ScalarNode,SequenceNode; yaml.SafeLoader.add_multi_constructor('!', lambda loader,tag_suffix,node: loader.construct_scalar(node) if isinstance(node, ScalarNode) else loader.construct_sequence(node) if isinstance(node, SequenceNode) else loader.construct_mapping(node)); files=['infrastructure/root-stack.yaml',*glob.glob('infrastructure/nested/*.yaml')]; [print(f'Checking YAML syntax: {f}') or yaml.load(open(f, encoding='utf-8'), Loader=yaml.SafeLoader) for f in files]"
