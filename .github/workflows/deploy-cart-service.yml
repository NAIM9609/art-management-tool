name: Deploy Cart Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/services/cart-service/**'
      - 'backend/src/**'
      - '.github/workflows/deploy-cart-service.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '20'
  AWS_REGION_CUSTOM: ${{ secrets.AWS_REGION_CUSTOM }}
  PROJECT_NAME: 'art-management-tool'
  SERVICE_NAME: 'cart-service'
  SERVICE_PATH: 'backend/services/cart-service'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cart Service (${{ github.event_name == 'push' && 'dev' || inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}

    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.LAMBDA_BUCKET }}" ] && MISSING="${MISSING} LAMBDA_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm i

      - name: Run tests
        working-directory: backend
        run: npm test -- --testPathPatterns="services/cart-service" --passWithNoTests

      - name: Build service (esbuild)
        working-directory: backend
        run: node esbuild.lambda.mjs cart

      - name: Package Lambda
        run: |
          cd backend/dist/lambda/cart-service
          zip -r /tmp/lambda.zip . -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_CUSTOM }}

      - name: Upload Lambda package to S3
        run: |
          S3_KEY="${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/${{ github.sha }}.zip"
          aws s3 cp /tmp/lambda.zip "s3://${{ secrets.LAMBDA_BUCKET }}/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

      - name: Update Lambda function code
        id: update_lambda
        run: |
          FUNCTIONS=(
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-get-cart"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-add-item"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-update-quantity"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-remove-item"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-clear-cart"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-apply-discount"
            "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-remove-discount"
          )
          set +e
          FAILED=0
          ANY_UPDATED=false
          for FN in "${FUNCTIONS[@]}"; do
            echo "Updating ${FN}..."
            if aws lambda update-function-code \
              --function-name "$FN" \
              --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
              --s3-key "${{ env.S3_KEY }}" \
              --no-cli-pager; then
              aws lambda wait function-updated --function-name "$FN"
              ANY_UPDATED=true
            else
              echo "::error::Failed to update ${FN}"
              FAILED=1
            fi
          done
          echo "any_updated=${ANY_UPDATED}" >> $GITHUB_OUTPUT
          exit $FAILED

      - name: Run smoke tests
        id: smoke_test
        run: |
          API_URL="${{ secrets.API_GATEWAY_URL }}"
          if [ -z "$API_URL" ]; then
            echo "API_GATEWAY_URL not set, skipping smoke tests"
            exit 0
          fi
          echo "Running smoke tests against ${API_URL}..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${API_URL}/api/cart?sessionId=smoke-test" || echo "000")
          FIRST_DIGIT="${HTTP_STATUS:0:1}"
          if [ "$HTTP_STATUS" = "000" ] || ([ "$FIRST_DIGIT" != "2" ] && [ "$FIRST_DIGIT" != "3" ]); then
            echo "Smoke test failed: HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Smoke test passed: HTTP ${HTTP_STATUS}"

      - name: Rollback on failure
        if: failure() && steps.update_lambda.outputs.any_updated == 'true'
        run: |
          echo "Rolling back due to failure..."
          PREV_S3_KEY="${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/previous.zip"
          if aws s3 ls "s3://${{ secrets.LAMBDA_BUCKET }}/${PREV_S3_KEY}" 2>/dev/null; then
            FUNCTIONS=(
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-get-cart"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-add-item"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-update-quantity"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-remove-item"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-clear-cart"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-apply-discount"
              "${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}-cart-service-remove-discount"
            )
            for FN in "${FUNCTIONS[@]}"; do
              aws lambda update-function-code \
                --function-name "$FN" \
                --s3-bucket "${{ secrets.LAMBDA_BUCKET }}" \
                --s3-key "${PREV_S3_KEY}" \
                --no-cli-pager || true
            done
            echo "Rollback completed"
          else
            echo "No previous version found for rollback"
          fi

      - name: Tag previous version in S3
        if: success()
        run: |
          aws s3 cp \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ env.S3_KEY }}" \
            "s3://${{ secrets.LAMBDA_BUCKET }}/${{ env.SERVICE_NAME }}/${{ env.DEPLOY_ENV }}/previous.zip" || true

      - name: Notify Slack on success
        if: success() && ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *${{ env.SERVICE_NAME }}* deployed to *${{ env.DEPLOY_ENV }}*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure() && ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *${{ env.SERVICE_NAME }}* deployment FAILED on *${{ env.DEPLOY_ENV }}*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}", "short": true },
                  { "title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
