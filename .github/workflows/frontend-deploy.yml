name: Frontend Build and Deploy

# Trigger the workflow on pushes to the specified branch
# Also allow manual triggering from the Actions tab
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

# Define environment variables that can be used across all jobs
env:
  NODE_VERSION: '20'  # Use Node.js LTS version
  PROJECT_NAME: 'art-management-tool'
  DEPLOY_ENV: 'prod'
  AWS_REGION_CUSTOM: ${{ secrets.AWS_REGION_CUSTOM }}
  AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
  AMPLIFY_BRANCH_NAME: ${{ secrets.AMPLIFY_BRANCH_NAME }}

jobs:
  build-and-deploy:
    name: Build Frontend and Deploy to AWS
    runs-on: ubuntu-latest
    
    # Explicitly set minimal permissions for security
    permissions:
      contents: read  # Required to checkout the repository
    
    steps:
      # Step 0: Validate required secrets before doing any work
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_REGION_CUSTOM }}" ] && MISSING="${MISSING} AWS_REGION_CUSTOM"
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && MISSING="${MISSING} AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="${MISSING} AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.S3_BUCKET_NAME }}" ] && MISSING="${MISSING} S3_BUCKET_NAME"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:${MISSING}"
            exit 1
          fi

      - name: Configure AWS credentials (endpoint discovery)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_CUSTOM || env.AWS_REGION_CUSTOM }}

      - name: Discover service API endpoints
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          get_stack_output() {
            local output_key="$1"
            local output
            output=$(aws cloudformation describe-stacks \
              --stack-name "${PROJECT_NAME}-root" \
              --region "${AWS_REGION_CUSTOM}" \
              --query "Stacks[0].Outputs[?OutputKey=='${output_key}'].OutputValue | [0]" \
              --output text 2>/dev/null || true)
            echo "${output}"
          }
          BACKEND_ENDPOINTS_READY=true
          SHARED_API_ID=$(get_stack_output "AuthApiId")
          SHARED_API_URL=$(get_stack_output "AuthApiEndpoint")

          if [ -z "${SHARED_API_ID}" ] || [ "${SHARED_API_ID}" = "None" ] || [ -z "${SHARED_API_URL}" ] || [ "${SHARED_API_URL}" = "None" ]; then
            echo "::error::Shared API outputs (AuthApiId/AuthApiEndpoint) were not found on ${PROJECT_NAME}-root."
            echo "::error::This workflow enforces a single API Gateway for all services. Deploy/update the root stack first."
            exit 1
          fi

          PRODUCT_API_URL="${SHARED_API_URL}"
          CART_API_URL="${SHARED_API_URL}"
          ORDER_API_URL="${SHARED_API_URL}"
          CONTENT_API_URL="${SHARED_API_URL}"
          DISCOUNT_API_URL="${SHARED_API_URL}"
          NOTIFICATION_API_URL="${SHARED_API_URL}"
          INTEGRATION_API_URL="${SHARED_API_URL}"
          echo "Using shared API endpoint from stack output: ${SHARED_API_URL} (${SHARED_API_ID})"

          echo "PRODUCT_API_URL=${PRODUCT_API_URL}" >> "$GITHUB_ENV"
          echo "CART_API_URL=${CART_API_URL}" >> "$GITHUB_ENV"
          echo "ORDER_API_URL=${ORDER_API_URL}" >> "$GITHUB_ENV"
          echo "CONTENT_API_URL=${CONTENT_API_URL}" >> "$GITHUB_ENV"
          echo "DISCOUNT_API_URL=${DISCOUNT_API_URL}" >> "$GITHUB_ENV"
          echo "NOTIFICATION_API_URL=${NOTIFICATION_API_URL}" >> "$GITHUB_ENV"
          echo "INTEGRATION_API_URL=${INTEGRATION_API_URL}" >> "$GITHUB_ENV"
          echo "BACKEND_ENDPOINTS_READY=${BACKEND_ENDPOINTS_READY}" >> "$GITHUB_ENV"

      - name: Validate backend endpoint reachability
        if: github.event_name != 'pull_request' && env.BACKEND_ENDPOINTS_READY == 'true'
        run: |
          PRODUCT_BASE_URL="${PRODUCT_API_URL}"
          CART_BASE_URL="${CART_API_URL}"
          ORDER_BASE_URL="${ORDER_API_URL}"
          CONTENT_BASE_URL="${CONTENT_API_URL}"
          DISCOUNT_BASE_URL="${DISCOUNT_API_URL}"
          NOTIFICATION_BASE_URL="${NOTIFICATION_API_URL}"
          INTEGRATION_BASE_URL="${INTEGRATION_API_URL}"

          PRODUCT_BASE_URL="${PRODUCT_BASE_URL%/}"
          CART_BASE_URL="${CART_BASE_URL%/}"
          ORDER_BASE_URL="${ORDER_BASE_URL%/}"
          CONTENT_BASE_URL="${CONTENT_BASE_URL%/}"
          DISCOUNT_BASE_URL="${DISCOUNT_BASE_URL%/}"
          NOTIFICATION_BASE_URL="${NOTIFICATION_BASE_URL%/}"
          INTEGRATION_BASE_URL="${INTEGRATION_BASE_URL%/}"

          check_status() {
            local method="$1"
            local base_url="$2"
            local path="$3"
            local body="${4:-}"
            local url="${base_url}${path}"
            local status
            if [ -n "${body}" ]; then
              status=$(curl -s -o /dev/null -w "%{http_code}" -X "${method}" -H "Content-Type: application/json" -d "${body}" "$url")
            else
              status=$(curl -s -o /dev/null -w "%{http_code}" -X "${method}" "$url")
            fi
            echo "${method} ${url} -> ${status}"
            if [ "$status" = "000" ] || [ "$status" = "404" ] || [ "$status" = "405" ]; then
              echo "::error::Backend endpoint check failed for ${url} (status ${status})."
              exit 1
            fi
          }

          if [ "${PRODUCT_BASE_URL}" != "${CART_BASE_URL}" ] || \
             [ "${PRODUCT_BASE_URL}" != "${ORDER_BASE_URL}" ] || \
             [ "${PRODUCT_BASE_URL}" != "${CONTENT_BASE_URL}" ] || \
             [ "${PRODUCT_BASE_URL}" != "${DISCOUNT_BASE_URL}" ] || \
             [ "${PRODUCT_BASE_URL}" != "${NOTIFICATION_BASE_URL}" ] || \
             [ "${PRODUCT_BASE_URL}" != "${INTEGRATION_BASE_URL}" ]; then
            echo "::error::Multiple API Gateway base URLs detected. A single shared API is required."
            exit 1
          fi

          check_status "GET" "${PRODUCT_BASE_URL}" "/health"
          check_status "GET" "${PRODUCT_BASE_URL}" "/api/products"
          check_status "GET" "${CART_BASE_URL}" "/api/cart"
          check_status "GET" "${ORDER_BASE_URL}" "/api/orders"
          check_status "GET" "${CONTENT_BASE_URL}" "/api/personaggi"
          check_status "POST" "${DISCOUNT_BASE_URL}" "/api/discounts/validate" '{"code":"SMOKE","cartTotal":100}'
          check_status "GET" "${NOTIFICATION_BASE_URL}" "/api/admin/notifications"
          check_status "GET" "${INTEGRATION_BASE_URL}" "/api/integrations/etsy/auth"

      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js environment
      # Uses the LTS version specified in env variables
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      
      # Step 4: Prepare for static export build
      # Remove API routes (not supported with output: 'export') and build static site
      - name: Build frontend (static export)
        working-directory: frontend
        run: |
          # Remove API routes - they only work in standalone/server mode.
          # In static export, the frontend calls the backend directly via NEXT_PUBLIC_API_URL.
          rm -rf app/api

          # Service-specific API base URLs.
          # In shared API mode, all values resolve to the same endpoint.
          # For pull requests, discovery is skipped and these fall back to placeholder values.
          export NEXT_PUBLIC_API_URL="${PRODUCT_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_PRODUCT_API_URL="${PRODUCT_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_CART_API_URL="${CART_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_ORDER_API_URL="${ORDER_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_CONTENT_API_URL="${CONTENT_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_DISCOUNT_API_URL="${DISCOUNT_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_NOTIFICATION_API_URL="${NOTIFICATION_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"
          export NEXT_PUBLIC_INTEGRATION_API_URL="${INTEGRATION_API_URL:-https://example.execute-api.${AWS_REGION_CUSTOM}.amazonaws.com/${DEPLOY_ENV}}"

          # Build with static export mode
          npm run build
        env:
          NODE_ENV: production
          # Tell next.config.ts to use output: 'export'
          NEXT_OUTPUT_MODE: export
      
      # Step 5: Create ZIP archive of static build artifacts
      # The 'out/' directory contains all static HTML, CSS, JS files ready for hosting
      - name: Create build archive
        working-directory: frontend
        run: |
          # Verify the static export output exists
          if [ ! -d "out" ]; then
            echo "ERROR: 'out' directory not found. Static export may have failed."
            exit 1
          fi

          echo "Static export contents:"
          ls -la out/
          echo ""
          echo "Locale directories:"
          ls -la out/it/ 2>/dev/null || echo "No /it directory"
          ls -la out/en/ 2>/dev/null || echo "No /en directory"

          # Generate timestamp for consistent file naming
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "BUILD_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

          # Create ZIP from the contents of out/ (files at root of ZIP = served at root of site)
          cd out
          zip -r ../../frontend-build-${TIMESTAMP}.zip .
          cp ../../frontend-build-${TIMESTAMP}.zip ../../frontend-build-latest.zip
          cd ..
      
      # Step 6: Configure AWS credentials
      # Uses GitHub Secrets for secure authentication with AWS
      # Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_CUSTOM || env.AWS_REGION_CUSTOM }}
      
      # Step 7: Upload build artifacts to S3
      # Uploads both timestamped and 'latest' versions of the build
      # Required secret: S3_BUCKET_NAME
      - name: Upload to S3
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          # Upload timestamped version with metadata
          aws s3 cp ../frontend-build-${BUILD_TIMESTAMP}.zip \
            s3://${{ secrets.S3_BUCKET_NAME }}/builds/frontend-build-${BUILD_TIMESTAMP}.zip \
            --metadata "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ),commit-sha=${{ github.sha }}"
          
          # Upload 'latest' version with metadata and cache control
          aws s3 cp ../frontend-build-latest.zip \
            s3://${{ secrets.S3_BUCKET_NAME }}/builds/frontend-build-latest.zip \
            --metadata "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ),commit-sha=${{ github.sha }}" \
            --cache-control "no-cache"
      
      # Step 8: Deploy to Amplify via CreateDeployment + StartDeployment
      # This method works for Amplify apps NOT connected to a repository provider.
      # Required secrets: AMPLIFY_APP_ID, AMPLIFY_BRANCH_NAME (optional, defaults to 'main')
      - name: Deploy to Amplify
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          if [ -n "$AMPLIFY_APP_ID" ]; then
            BRANCH_NAME="${AMPLIFY_BRANCH_NAME:-main}"
            echo "Creating Amplify deployment for app: ${AMPLIFY_APP_ID}, branch: ${BRANCH_NAME}"

            # Step 8a: Create a deployment to get a pre-signed upload URL
            DEPLOYMENT=$(aws amplify create-deployment \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "${BRANCH_NAME}" \
              --output json)

            UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')
            JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')

            echo "Got deployment job ID: ${JOB_ID}"

            # Step 8b: Upload the build zip to the pre-signed URL
            echo "Uploading build artifact to Amplify..."
            curl --fail --silent --show-error \
              -T ../frontend-build-latest.zip \
              "${UPLOAD_URL}"

            echo "Upload complete."

            # Step 8c: Start the deployment with the uploaded artifact
            aws amplify start-deployment \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "${BRANCH_NAME}" \
              --job-id "${JOB_ID}"

            echo "Amplify deployment started successfully (job: ${JOB_ID})"
            echo "AMPLIFY_TRIGGERED=api" >> $GITHUB_ENV
          else
            echo "AMPLIFY_APP_ID not set, skipping Amplify deployment"
            echo "AMPLIFY_TRIGGERED=none" >> $GITHUB_ENV
          fi
      
      # Step 9: Output deployment information
      - name: Deployment summary
        run: |
          echo "✅ Frontend build completed successfully"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🧪 Pull request build only — deploy steps skipped"
          else
            echo "📦 Build archive uploaded to S3"
          fi
          
          # Conditionally report Amplify deployment status
          if [ "$AMPLIFY_TRIGGERED" = "api" ]; then
            echo "🚀 Amplify deployment triggered via API (app: $AMPLIFY_APP_ID)"
          elif [ "$AMPLIFY_TRIGGERED" = "webhook" ]; then
            echo "🚀 Amplify deployment triggered via webhook"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🚫 Amplify deployment skipped for pull requests"
          else
            echo "🚫 Amplify deployment was not triggered (no AMPLIFY_APP_ID or webhook configured)"
          fi
          
          echo ""
          echo "Build details:"
          echo "  - Commit: ${{ github.sha }}"
          echo "  - Branch: ${{ github.ref_name }}"
          echo "  - S3 Bucket: ${{ secrets.S3_BUCKET_NAME }}"
          echo "  - Build file: frontend-build-latest.zip"